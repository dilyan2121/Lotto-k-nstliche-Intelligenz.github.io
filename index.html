<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTO AI | Security Dashboard v5.0</title>
    <style>
        :root {
            --primary: #00ff41; /* Hacker Green */
            --accent: #005195;  /* Deep Blue */
            --bg-dark: #05080a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Dışarı taşan resimleri gizler */
            position: relative;
        }

        /* --- ARKA PLAN PNG KATMANLARI --- */
        .bg-layer {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            filter: brightness(0.6) contrast(1.2);
        }

        /* Sol Üst Görsel (png1) */
        .png-1 {
            top: -10%;
            left: -5%;
            width: 35%;
            opacity: 0.25;
            transform: rotate(-10deg);
        }

        /* Sağ Alt Görsel (png2) */
        .png-2 {
            bottom: -5%;
            right: -5%;
            width: 40%;
            opacity: 0.2;
        }

        /* Orta Arka Plan Görsel (png3) */
        .png-3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            opacity: 0.08; /* Çok hafif, rahatsız etmeyen bir doku */
        }

        /* --- ANA PANEL (DASHBOARD) --- */
        .glass-card {
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.15);
            backdrop-filter: blur(10px);
            z-index: 10; /* Resimlerin önünde durması için */
            position: relative;
        }

        .main-logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px var(--primary);
            margin-bottom: 25px;
            object-fit: cover;
        }

        h1 {
            font-size: 22px;
            color: var(--primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
        }

        .badge {
            font-size: 12px;
            color: #8b949e;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #30363d;
            display: inline-block;
            margin: 15px 0 25px 0;
        }

        .preview-img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(88, 166, 255, 0.3);
        }

        /* İndirme Butonu (Almanca) */
        .download-btn {
            background: linear-gradient(135deg, #00ff41 0%, #008f11 100%);
            color: #000;
            text-decoration: none;
            display: block;
            padding: 18px;
            font-weight: 800;
            border-radius: 12px;
            font-size: 18px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 255, 65, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0, 255, 65, 0.5);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: #484f58;
            letter-spacing: 1px;
        }

        .dot {
            height: 8px; width: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px var(--primary);
        }
    </style>
</head>
<body>

    <!-- ARKA PLAN PNG RESİMLERİ -->
    <img src="png1.png" class="bg-layer png-1" onerror="this.style.display='none'">
    <img src="png2.png" class="bg-layer png-2" onerror="this.style.display='none'">
    <img src="png3.png" class="bg-layer png-3" onerror="this.style.display='none'">

    <div class="glass-card">
        <!-- Ana Logo -->
        <img src="logo.png" alt="Lotto AI" class="main-logo" onerror="this.src='https://github.com/identicons/app.png'">
        
        <h1>LOTTO ANALYSE</h1>
        <div class="badge">
            <span class="dot"></span> STATUS: VERSCHLÜSSELT
        </div>

        <!-- Görsel 2 (Banner/Analyse) -->
        <img src="gorsel2.png" alt="Dashboard" class="preview-img" onerror="this.style.display='none'">

        <!-- APK İndirme Butonu -->
        <a href="nfc_relay_v4.apk" class="download-btn">
            APK HERUNTERLADEN
        </a>

        <div class="footer-note">
            Sicherheitssysteme v5.0.1<br>
            NFC Bridge & HCE Protocol Enabled<br>
            &copy; 2026 Dilyan2121 Master Project
        </div>
    </div>

</body>
</html>
