<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Lotto AI - Tahmin Motoru</title>
    <style>
        body { background: #0f0f0f; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #00ff41; display: inline-block; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #00ff41; }
        button { background: #00ff41; color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🤖 LOTTO AI PREDICTOR v1.0</h1>
        <p>Yapay zeka algoritmaları ile şanslı numaraları analiz et.</p>
        <div id="result" style="font-size: 24px; font-weight: bold; margin: 20px;">-- -- -- -- -- --</div>
        <img src="logo.png" alt="Lotto AI Logo" style="width:200px;">
        <button onclick="generate()">NUMARA ÜRET</button>
    </div>

    <script>
        function generate() {
            let nums = [];
            while(nums.length < 6) {
                let r = Math.floor(Math.random() * 49) + 1;
                if(nums.indexOf(r) === -1) nums.push(r);
            }
            document.getElementById('result').innerText = nums.sort((a,b)=>a-b).join(' - ');
        }
    </script>
</body>
</html>
